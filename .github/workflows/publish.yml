name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Fail if workflow is not running on main
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Releases must run from main. Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Update npm
        run: npm install -g npm@latest

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          # Bump installer version first
          cd installer && npm version ${{ inputs.version }} --no-git-tag-version && cd ..
          # Get the new version and apply same version to root
          NEW_VERSION=$(node -p "require('./installer/package.json').version")
          npm version $NEW_VERSION --no-git-tag-version --allow-same-version
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push release ref
        id: push_release_ref
        run: |
          git add package.json installer/package.json
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push
          if ! git push --tags; then
            echo "Tag push failed after the release commit may have been pushed."
            echo "If needed, delete the tag with: git tag -d v${{ steps.version.outputs.version }} && git push --delete origin v${{ steps.version.outputs.version }}"
            echo "That removes the tag only; it does not undo any release commit already pushed."
            echo "Before the next release, revert the pushed release commit or recover from the same version baseline."
            exit 1
          fi

      - name: Publish installer to npm
        id: publish_to_npm
        working-directory: installer
        run: npm publish --provenance --access public

      - name: Explain post-push cleanup
        if: ${{ failure() && steps.push_release_ref.outcome == 'success' && steps.publish_to_npm.outcome == 'failure' }}
        run: |
          echo "Publish failed after pushing tag v${{ steps.version.outputs.version }}"
          echo "If needed, delete the tag with: git tag -d v${{ steps.version.outputs.version }} && git push --delete origin v${{ steps.version.outputs.version }}"
          echo "That removes the tag only; it does not undo any release commit already pushed."
          echo "  git tag -d v${{ steps.version.outputs.version }}"
          echo "  git push origin :refs/tags/v${{ steps.version.outputs.version }}"
          echo "Before the next release, revert the pushed release commit or recover from the same version baseline."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
